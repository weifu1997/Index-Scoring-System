name: Update market data

on:
  schedule:
    - cron: "30 21 * * *"
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update cached market data
        run: python scripts/update_market_data.py --force-daily

      - name: Commit changed data
        shell: bash
        run: |
          if git diff --quiet -- data; then
            echo "Market data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: update cached market data"
          git push
